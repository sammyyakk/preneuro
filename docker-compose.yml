services:
  postgres:
    image: postgres:15-alpine
    container_name: preneuro-db
    environment:
      POSTGRES_USER: preneuro
      POSTGRES_PASSWORD: preneuro_dev
      POSTGRES_DB: preneuro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preneuro"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
